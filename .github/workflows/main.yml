name: Build and Release sysml-lca-connector

on:
  push:
    branches:
      - main
    tags:
      - 'v*'          # z.B. v1.0.0, v1.2.3
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pyinstaller

      - name: Build EXE with PyInstaller
        shell: bash
        run: |
          pyinstaller --onefile --windowed \
            --name sysml-lca-connector \
            --icon=src/logo.ico \
            --add-data "src/logo.ico;." \
            src/sysml-lca-connector.py
            
      - name: Prepare artifact folder
        run: |
          mkdir artifact
          copy dist\sysml-lca-connector.exe artifact\
          copy release-assets\readme.md artifact\
          copy src\preferences.ini artifact\
          
      - name: Upload EXE as artifact
        uses: actions/upload-artifact@v4
        with:
          name: sysml-lca-connector
          path: artifact\
          
      - name: Create or update Release and upload assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/sysml-lca-connector.exe
            release-assets/readme.md
            src/preferences.ini

